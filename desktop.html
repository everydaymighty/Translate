  chName.onclick = () => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-title">SELECT CHANNEL</div>
        <div class="modal-body" style="padding: 0">
          ${NodeComms.channels.map(c => `
            <div class="vc-opt" data-ch="${escapeHtml(c)}" style="padding: 12px 18px; cursor: pointer; border-bottom: 1px solid #eee; ${c === NodeComms.channel ? 'background: var(--accent); color: var(--ink); font-weight: bold;' : ''}">
              ● ${escapeHtml(c)}
            </div>
          `).join('')}
        </div>
        <div class="modal-actions"><button id="vc-cancel">Cancel</button></div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelectorAll('.vc-opt').forEach(o => {
      o.onclick = () => {
        NodeComms.setChannel(o.dataset.ch);
        overlay.remove();
        renderAll();
      };
    });
    overlay.querySelector('#vc-cancel').onclick = () => overlay.remove();
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  };

  function renderMembers() {
    const members = NodeComms.members();
    counter.textContent = members.length + ' ONLINE';
    mlist.innerHTML = '';
    members.forEach(m => {
      const pref = NodeComms.prefFor(m.id);
      const el = document.createElement('div');
      el.className = 'cm-member' + (pref.muted ? ' muted' : '');
      el.dataset.uid = m.id;
      el.innerHTML = `
        <div class="cm-row">
          <div class="cm-mdot" style="background:${m.color}"></div>
          <div class="cm-mname">${escapeHtml(m.name)}${m.isHome ? ' [YOU]' : ''}</div>
          <button class="cm-mmute ${pref.muted ? 'on' : ''}" title="Mute user">${pref.muted ? '🔇' : '♪'}</button>
        </div>
        ${m.isHome ? '' : `<input type="range" class="cm-mvol" min="0" max="100" value="${pref.volume}" title="${escapeHtml(m.name)} volume" />`}
      `;
      el.querySelector('.cm-mmute').onclick = (e) => {
        e.stopPropagation();
        pref.muted = !pref.muted;
        NodeComms.savePrefs();
        renderMembers();
      };
      const vol = el.querySelector('.cm-mvol');
      if (vol) vol.oninput = (e) => { pref.volume = parseInt(e.target.value, 10); NodeComms.savePrefs(); };
      mlist.appendChild(el);
    });
  }

  function linkify(text) {
    const escaped = escapeHtml(text);
    return escaped.replace(/((?:https?:\/\/|www\.)[^\s<]+)/gi, (match) => {
      let url = match;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      return `<a href="#" data-url="${escapeHtml(url)}">${escapeHtml(match)}</a>`;
    });
  }

  function renderChat() {
    const msgs = NodeComms.msgList();
    feed.innerHTML = '';
    if (msgs.length === 0) {
      feed.innerHTML = '<div class="cm-chat-empty">— NO MESSAGES YET —<br><br>SAY HI</div>';
      return;
    }
    msgs.forEach(m => {
      const el = document.createElement('div');
      el.className = 'cm-msg' + (m.system ? ' system' : '');
      let who = 'SYSTEM', color = '#888';
      if (m.senderName) {
        // Firebase-carried sender info (from another browser, or our own echo)
        who = m.senderName;
        color = m.senderColor || '#888';
      } else if (!m.system) {
        // Legacy local-only message — look up profile
        const p = NodeProfiles.list.find(x => x.id === m.profileId);
        if (p) { who = p.name; color = p.color; }
        else { who = '???'; color = '#888'; }
      }
      const time = new Date(m.ts);
      const pad = n => String(n).padStart(2, '0');
      const timeStr = pad(time.getHours()) + ':' + pad(time.getMinutes());
      el.innerHTML = `
        <div class="cm-mdot" style="background:${color}"></div>
        <div class="cm-mbox">
          <div class="cm-mhead"><span class="cm-who">${escapeHtml(who)}</span><span class="cm-when">${timeStr}</span></div>
          <div class="cm-mtext">${linkify(m.text)}</div>
        </div>
      `;
      feed.appendChild(el);
    });
    feed.querySelectorAll('a[data-url]').forEach(a => {
      a.onclick = (e) => {
        e.preventDefault();
        openApp('browser', { url: a.dataset.url });
      };
    });
    feed.scrollTop = feed.scrollHeight;
  }

  function send() {
    const text = chatInput.value.trim();
    if (!text) return;
    NodeComms.sendMessage(text, NodeProfiles.homeId);
    chatInput.value = '';
    renderChat();
  }
  sendBtn.onclick = send;
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); send(); }
  });

  function startMeter() {
    if (meterTicker) cancelAnimationFrame(meterTicker);
    if (!NodeComms.analyser) return;
    const data = new Uint8Array(NodeComms.analyser.frequencyBinCount);
    const tick = () => {
      if (!NodeComms.micEnabled || !NodeComms.analyser) { vbar.style.width = '0%'; return; }
      NodeComms.analyser.getByteFrequencyData(data);
      let sum = 0; for (let i = 0; i < data.length; i++) sum += data[i];
      const avg = sum / data.length;
      const pct = Math.min(100, (avg / 80) * 100);
      vbar.style.width = pct + '%';
      const homeUser = mlist.querySelector(`.cm-member[data-uid="${NodeProfiles.homeId}"]`);
      if (homeUser) homeUser.classList.toggle('speaking', avg > 25);
      meterTicker = requestAnimationFrame(tick);
    };
    meterTicker = requestAnimationFrame(tick);
  }

  async function joinVoice() {
    if (NodeComms.joined) return;
    const ok = await NodeComms.enableMic();
    if (!ok) return;
    NodeComms.joined = true;
    vstatus.textContent = 'CONNECTED';
    vmic.classList.add('on'); vmic.classList.remove('off');
    vjoin.textContent = 'LEAVE VOICE';
    vjoin.classList.add('leave');
    startMeter();
    refreshToolbar();
    NodeComms.sendSystem(`${NodeProfiles.home()?.name || 'YOU'} joined voice.`);
    renderChat();
  }

  function leaveVoice() {
    NodeComms.disableMic();
    NodeComms.joined = false;
    if (meterTicker) { cancelAnimationFrame(meterTicker); meterTicker = null; }
    vbar.style.width = '0%';
    vstatus.textContent = 'IDLE';
    vmic.classList.remove('on');
    vjoin.textContent = 'JOIN VOICE';
    vjoin.classList.remove('leave');
    const homeUser = mlist.querySelector(`.cm-member[data-uid="${NodeProfiles.homeId}"]`);
    if (homeUser) homeUser.classList.remove('speaking');
    refreshToolbar();
    NodeComms.sendSystem(`${NodeProfiles.home()?.name || 'YOU'} left voice.`);
    renderChat();
  }
  vjoin.onclick = () => NodeComms.joined ? leaveVoice() : joinVoice();

  function renderScreen() {
    sstage.innerHTML = '';
    if (NodeComms.screenActive && NodeComms.screenStream) {
      const live = document.createElement('div');
      live.className = 'ss-live';
      live.textContent = '● LIVE';
      sstage.appendChild(live);
      const video = document.createElement('video');
      video.autoplay = true; video.muted = true; video.playsInline = true;
      video.srcObject = NodeComms.screenStream;
      sstage.appendChild(video);
      sshare.textContent = '■ STOP SHARING';
      sshare.classList.add('stop');
    } else {
      sstage.innerHTML = `
        <div class="ss-idle">
          <div class="ss-tag">◫ SCREEN SHARE</div>
          <p>Share your screen, window, or tab with friends.</p>
          <p>Previews locally now — peers see it in Phase 4.</p>
        </div>
      `;
      sshare.textContent = '● START SHARING';
      sshare.classList.remove('stop');
    }
  }
  sshare.onclick = async () => {
    if (NodeComms.screenActive) {
      NodeComms.stopScreenShare();
      renderScreen(); refreshToolbar();
      NodeComms.sendSystem(`${NodeProfiles.home()?.name || 'YOU'} stopped sharing.`);
      renderChat();
    } else {
      const ok = await NodeComms.startScreenShare(() => {
        renderScreen(); refreshToolbar();
        NodeComms.sendSystem(`${NodeProfiles.home()?.name || 'YOU'} stopped sharing.`);
        renderChat();
      });
      if (!ok) return;
      renderScreen(); refreshToolbar();
      NodeComms.sendSystem(`${NodeProfiles.home()?.name || 'YOU'} started sharing their screen.`);
      renderChat();
    }
  };

  function refreshToolbar() {
    tbtns.forEach(b => {
      const k = b.dataset.tbn;
      b.classList.remove('on', 'off');
      if (k === 'mic')    b.classList.toggle('on', NodeComms.micEnabled);
      if (k === 'deafen') b.classList.toggle('off', NodeComms.deafened);
      if (k === 'screen') b.classList.toggle('on', NodeComms.screenActive);
    });
  }
  tbtns.forEach(b => b.onclick = async () => {
    const k = b.dataset.tbn;
    if (k === 'mic') {
      if (!NodeComms.joined) { await joinVoice(); return; }
      if (NodeComms.micEnabled) { NodeComms.disableMic(); refreshToolbar(); }
      else { await NodeComms.enableMic(); startMeter(); refreshToolbar(); }
    } else if (k === 'deafen') {
      NodeComms.deafened = !NodeComms.deafened;
      refreshToolbar();
    } else if (k === 'screen') {
      if (NodeComms.screenActive) { NodeComms.stopScreenShare(); }
      else { await NodeComms.startScreenShare(() => { renderScreen(); refreshToolbar(); }); }
      renderScreen(); refreshToolbar();
    } else if (k === 'leave') {
      if (NodeComms.joined) leaveVoice();
      if (NodeComms.screenActive) { NodeComms.stopScreenShare(); renderScreen(); refreshToolbar(); }
    }
  });

  function renderAll() {
    chName.textContent = NodeComms.channel.toUpperCase();
    chatInput.placeholder = 'message #' + NodeComms.channel.toLowerCase().replace(/\s+/g, '-') + ' — links auto-detected';
    renderMembers(); renderChat(); renderScreen(); refreshToolbar();
    if (NodeComms.joined) startMeter();
  }
  // Live updates from Firebase: when a message arrives, refresh the chat feed.
  NodeComms._renderHook = () => {
    if (!openWindows['comms']) return;
    chName.textContent = NodeComms.channel.toUpperCase();
    chatInput.placeholder = 'message #' + NodeComms.channel.toLowerCase().replace(/\s+/g, '-') + ' — links auto-detected';
    renderChat(); renderMembers();
  };
  renderAll();

  // Simulated speaking pulses for other members while in voice
  simTimer = setInterval(() => {
    if (!NodeComms.joined) return;
    mlist.querySelectorAll('.cm-member').forEach(u => {
      if (u.dataset.uid === NodeProfiles.homeId) return;
      const pref = NodeComms.userPrefs[u.dataset.uid];
      if (pref && pref.muted) return;
      if (Math.random() < 0.12) {
        u.classList.add('speaking');
        setTimeout(() => u.classList.remove('speaking'), 600 + Math.random() * 1200);
      }
    });
  }, 1000);

  // Cleanup when window closes — find the comms window and observe removal
  // (Simple approach: rely on garbage collection; intervals will idle harmlessly.)
  // For thorough cleanup we'd hook into closeWindow.

  return root;
}

/* ============================================================
   NODE PRESENCE — live cursor sync (scaffolding for Phase 4)
   Publishes normalized mouse position to /presence/{uid}.
   Subscribes to all others and renders a labeled cursor per peer.
   ============================================================ */
const NodePresence = {
  PUBLISH_HZ: 20,            // updates per second
  ref: null,
  myRef: null,
  cursors: {},               // uid -> { el, lastTs }
  lastPublish: 0,
  initialized: false,

  init() {
    if (this.initialized) return;
    if (!fbDb || !fbUser) return;
    this.initialized = true;

    const home = NodeProfiles.home();
    const initial = {
      name:  home?.name  || 'NODE',
      color: home?.color || '#B89A5C',
      x: 0.5, y: 0.5,
      ts: firebase.database.ServerValue.TIMESTAMP
    };

    this.myRef = fbDb.ref('presence/' + fbUser.uid);
    this.myRef.set(initial).catch(e => console.warn('[NODE] Presence set failed:', e));
    // Auto-clear when this tab closes / disconnects
    this.myRef.onDisconnect().remove();

    // Subscribe to all peers
    this.ref = fbDb.ref('presence');
    this.ref.on('child_added',   (snap) => this.renderCursor(snap.key, snap.val()));
    this.ref.on('child_changed', (snap) => this.renderCursor(snap.key, snap.val()));
    this.ref.on('child_removed', (snap) => this.removeCursor(snap.key));

    // Mouse tracking (throttled)
    document.addEventListener('mousemove', (e) => this.publishCursor(e));
    // Re-publish on window blur/focus so peers see you wake up
    window.addEventListener('focus', () => this.publishIdentity());
    console.log('[NODE] Presence online for', fbUser.uid);
  },

  publishIdentity() {
    if (!this.myRef) return;
    const home = NodeProfiles.home();
    this.myRef.update({
      name:  home?.name  || 'NODE',
      color: home?.color || '#B89A5C'
    }).catch(() => {});
  },

  publishCursor(e) {
    if (!this.myRef) return;
    const now = Date.now();
    const minDelta = 1000 / this.PUBLISH_HZ;
    if (now - this.lastPublish < minDelta) return;
    this.lastPublish = now;
    const home = NodeProfiles.home();
    this.myRef.update({
      x: e.clientX / window.innerWidth,
      y: e.clientY / window.innerHeight,
      name:  home?.name  || 'NODE',
      color: home?.color || '#B89A5C'
    }).catch(() => { /* swallow noise */ });
  },

  renderCursor(uid, data) {
    if (!data || uid === fbUser?.uid) return; // skip self
    let entry = this.cursors[uid];
    if (!entry) {
      const el = document.createElement('div');
      el.className = 'remote-cursor';
      el.innerHTML = '<span class="rc-arrow"></span><span class="rc-chip"><span class="rc-dot"></span><span class="rc-name"></span></span>';
      document.body.appendChild(el);
      entry = this.cursors[uid] = { el };
    }
    entry.el.querySelector('.rc-dot').style.background  = data.color || '#888';
    entry.el.querySelector('.rc-arrow').style.borderColor = data.color || '#888';
    entry.el.querySelector('.rc-name').textContent = data.name || '???';
    const x = (data.x ?? 0.5) * window.innerWidth;
    const y = (data.y ?? 0.5) * window.innerHeight;
    entry.el.style.transform = `translate(${x}px, ${y}px)`;
    this._updateTray();
  },

  removeCursor(uid) {
    const entry = this.cursors[uid];
    if (entry) { entry.el.remove(); delete this.cursors[uid]; }
    this._updateTray();
  },

  _updateTray() {
    const peers = Object.keys(this.cursors).length;
    const total = peers + 1;
    const el = document.getElementById('online-count');
    if (el) {
      el.textContent = total + ' ONLINE';
      el.style.color = peers > 0 ? 'var(--good)' : 'var(--accent)';
    }
    // Refresh comms members list if open
    if (window.NodeComms && NodeComms._renderHook) NodeComms._renderHook();
  }
};

/* ============================================================
   NODE ICONS — per-app icon overrides + right-click customization
   ============================================================ */
const NodeIcons = {
  STORAGE_KEY: 'node-icons-v1',
  DEFAULTS: {
    files:   '📁',
    notes:   '📝',
    paint:   '🎨',
    browser: '🌐',
    comms:   '💬'
  },
  overrides: {},

  init() {
    try { this.overrides = JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || {}; }
    catch { this.overrides = {}; }
    this.apply();
  },

  iconFor(app) {
    return this.overrides[app] || this.DEFAULTS[app] || '◌';
  },

  apply() {
    document.querySelectorAll('.icon[data-app]').forEach(icon => {
      const app = icon.dataset.app;
      const glyph = icon.querySelector('.glyph');
      if (glyph) glyph.textContent = this.iconFor(app);
    });
  },

  set(app, icon) {
    this.overrides[app] = icon;
    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.overrides));
    this.apply();
  },

  reset(app) {
    delete this.overrides[app];
    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.overrides));
    this.apply();
  }
};

  '🌐','🌍','🌏','💬','🗨','📧','✉','📞','📡',
  '🎵','🎶','🎸','🎹','🎷','🥁',
  '⚙','🔧','🔨','🔩','💡','🔋','🖥','💻','⌨','🖱',
  '🎮','🕹','🎲','🎯','♟','🃏',
  '⭐','✨','🔥','💎','💠','🌟','☀','🌙','☁','⚡','🌈',
  '🚀','✈','🛸','🌸','🌿','🍃','🌊','🏔','🗿','🏛',

function setupIconContextMenu() {
  document.querySelectorAll('.icon[data-app]').forEach(icon => {
    if (icon._ctxWired) return;
    icon._ctxWired = true;
    icon.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const app = icon.dataset.app;
      showContextMenu(e.clientX, e.clientY, [
        { label: 'Open',         action: () => openApp(app) },
        { sep: true },
        { label: 'Change Icon',  action: () => promptChangeIcon(app) },
        { label: 'Reset Icon',   action: () => NodeIcons.reset(app), disabled: !NodeIcons.overrides[app] }
      ]);
    });
  });
}

function promptChangeIcon(app) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width: 480px;">
      <div class="modal-title">CHANGE ICON — ${escapeHtml(app.toUpperCase())}</div>
      <div class="modal-body">
        Pick a new icon. Your choice saves locally and shows up next time you open NODE.
        <div class="icon-picker" id="icon-picker-grid"></div>
      </div>
      <div class="modal-actions">
        <button id="ic-reset">Reset to default</button>
        <button id="ic-cancel" class="primary">Done</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const grid = overlay.querySelector('#icon-picker-grid');
  const current = NodeIcons.iconFor(app);
  ICON_OPTIONS.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'icon-opt' + (opt === current ? ' current' : '');
    btn.textContent = opt;
    btn.onclick = () => {
      NodeIcons.set(app, opt);
      overlay.querySelectorAll('.icon-opt').forEach(b => b.classList.remove('current'));
      btn.classList.add('current');
    };
    grid.appendChild(btn);
  });
  overlay.querySelector('#ic-reset').onclick = () => { NodeIcons.reset(app); overlay.remove(); };
  overlay.querySelector('#ic-cancel').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
}

/* ============================================================
   NODE PROFILES — multi-instance system
   Each profile = own name, color, filesystem, open windows.
   Persisted in localStorage. Scaffolding for Phase 4 multiplayer.
   ============================================================ */
const NodeProfiles = {
  STORAGE_KEY: 'node-profiles-v1',
  ACTIVE_KEY:  'node-active-profile',
  HOME_KEY:    'node-home-profile',  // the "you" profile
  COLORS: ['#FF6A1A','#E53935','#FBC02D','#43A047','#1E88E5','#8E24AA','#00ACC1','#FF80AB','#5D4037','#90A4AE','#26A69A','#7E57C2','#EC407A','#7CB342','#FB8C00','#0A0A0A'],

  list: [],
  activeId: null,
  homeId: null,

  init() {
    // Load
    try { this.list = JSON.parse(localStorage.getItem(this.STORAGE_KEY)) || []; }
    catch { this.list = []; }
    this.activeId = localStorage.getItem(this.ACTIVE_KEY);
    this.homeId   = localStorage.getItem(this.HOME_KEY);

    // First boot — create default + migrate any legacy FS
    if (this.list.length === 0) {
      const id = this.genId();
      // Migrate legacy NodeFS (pre-profile) into this default profile
      const legacy = localStorage.getItem('node-fs-v1');
      if (legacy) {
        localStorage.setItem('node-fs-v1:' + id, legacy);
        localStorage.removeItem('node-fs-v1');
      }
      this.list.push({
        id, name: 'NODE',
        color: this.COLORS[0],
        createdAt: Date.now(),
        windowState: []
      });
      this.activeId = id;
      this.homeId = id;
      this.persist();
    }
    if (!this.activeId || !this.list.find(p => p.id === this.activeId)) {
      this.activeId = this.list[0].id;
    }
    if (!this.homeId || !this.list.find(p => p.id === this.homeId)) {
      this.homeId = this.activeId;
    }
    this.persist();
  },

  genId() { return 'p_' + Math.random().toString(36).slice(2, 10); },

  persist() {
    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.list));
    localStorage.setItem(this.ACTIVE_KEY, this.activeId);
    localStorage.setItem(this.HOME_KEY, this.homeId);
  },

  active() { return this.list.find(p => p.id === this.activeId); },
  home()   { return this.list.find(p => p.id === this.homeId); },
  isSpectating() { return this.activeId !== this.homeId; },

  create({ name, color }) {
    const id = this.genId();
    const p = { id, name, color, createdAt: Date.now(), windowState: [] };
    this.list.push(p);
    this.persist();
    return p;
  },

  rename(id, newName) {
    const p = this.list.find(x => x.id === id);
    if (!p) return false;
    p.name = newName;
    this.persist();
    return true;
  },

  remove(id) {
    if (this.list.length <= 1) return false;
    if (this.homeId === id) return false; // can't delete your home
    this.list = this.list.filter(p => p.id !== id);
    localStorage.removeItem('node-fs-v1:' + id);
    if (this.activeId === id) this.setActive(this.list[0].id, { skipReload: false });
    this.persist();
    return true;
  },

  recordOpenApps() {
    const p = this.active();
    if (!p) return;
    p.windowState = Object.entries(openWindows).map(([id, w]) => {
      // Try to recover app name from id
      let app = id.split(':')[0]; // e.g., "paint", "notes", "viewer", "files"
      let opts = {};
      if (id.startsWith('notes:') || id.startsWith('viewer:')) {
        opts.path = id.split(':').slice(1).join(':');
      }
      return { id, app, opts, title: w.taskEl?.textContent || '' };
    });
    this.persist();
  },

  setActive(id, { skipReload = false } = {}) {
    if (id === this.activeId) return;
    // Save outgoing profile's window state
    this.recordOpenApps();
    this.activeId = id;
    this.persist();
    if (!skipReload) reloadActiveProfile();
  }
};

function reloadActiveProfile() {
  // Close all open windows
  Object.keys(openWindows).slice().forEach(id => closeWindow(id));
  // Reload FS from the new profile's key
  NodeFS.init();
  // Re-open the new profile's saved windows
  const p = NodeProfiles.active();
  (p?.windowState || []).forEach(w => {
    try { openApp(w.app, w.opts || {}); } catch (e) { /* swallow */ }
  });
  // Refresh chip + banner + cursor
  renderUserChip();
  updateSpecBanner();
  updateCursorLabel();
  // If instances popup was open, re-render it
  if (document.getElementById('instances-popup').classList.contains('open')) {
    renderInstancesList();
  }
}

/* ============================================================
   USER CHIP + INSTANCES POPUP
   ============================================================ */
function renderUserChip() {
  const chip = document.getElementById('user-chip');
  const p = NodeProfiles.active();
  if (!p) return;
  chip.querySelector('.ch-dot').style.background = p.color;
  chip.querySelector('.ch-name').textContent = p.name;
}

function toggleInstances(e) {
  if (e) e.stopPropagation();
  const popup = document.getElementById('instances-popup');
  const chip = document.getElementById('user-chip');
  const isOpen = popup.classList.toggle('open');
  chip.classList.toggle('open', isOpen);
  // close start menu if open
  document.getElementById('start-menu').classList.remove('open');
  if (isOpen) renderInstancesList();
}

function renderInstancesList() {
  const list = document.getElementById('instances-list');
  list.innerHTML = '';
  NodeProfiles.list.forEach(p => {
    const isActive = p.id === NodeProfiles.activeId;
    const isHome   = p.id === NodeProfiles.homeId;
    const apps = (p.windowState || []).map(w => `<span class="app-tag">${escapeHtml(w.app)}</span>`).join('');
    const item = document.createElement('div');
    item.className = 'ip-item' + (isActive ? ' active' : '');
    item.innerHTML = `
      <div class="ip-row">
        <div class="ip-dot" style="background:${p.color}"></div>
        <div class="ip-name">${escapeHtml(p.name)}</div>
        ${isHome ? '<span class="ip-tag">YOU</span>' : ''}
        ${isActive && !isHome ? '<span class="ip-tag">VIEWING</span>' : ''}
        <div class="ip-actions">
          <button class="ip-act" data-act="rename" title="Rename">✎</button>
          <button class="ip-act danger" data-act="delete" title="Delete" ${isHome ? 'disabled style="opacity:0.3;cursor:not-allowed"' : ''}>×</button>
        </div>
      </div>
      <div class="ip-apps">${apps || '<span class="none">no apps open</span>'}</div>
    `;
    // Click row → switch (unless clicking an action button)
    item.addEventListener('click', (ev) => {
      if (ev.target.closest('.ip-act')) return;
      if (isActive) return;
      NodeProfiles.setActive(p.id);
      document.getElementById('instances-popup').classList.remove('open');
      document.getElementById('user-chip').classList.remove('open');
    });
    // Rename
    item.querySelector('[data-act="rename"]').addEventListener('click', async (ev) => {
      ev.stopPropagation();
      const name = await nodePrompt('Rename Instance', 'New name:', p.name, '');
      if (!name) return;
      NodeProfiles.rename(p.id, name);
      renderInstancesList();
      renderUserChip();
      updateCursorLabel();
      updateSpecBanner();
    });
    // Delete
    item.querySelector('[data-act="delete"]').addEventListener('click', async (ev) => {
      ev.stopPropagation();
      if (isHome) return;
      const ok = await nodeConfirm('Delete Instance', `Delete "${p.name}"?\nAll its files will be lost.\nThis cannot be undone.`);
      if (!ok) return;
      const wasActive = isActive;
      NodeProfiles.remove(p.id);
      if (wasActive) reloadActiveProfile();
      renderInstancesList();
      renderUserChip();
    });
    list.appendChild(item);
  });
}

async function promptCreateInstance() {
  // Custom modal with color picker
  let chosenColor = NodeProfiles.COLORS[Math.floor(Math.random() * NodeProfiles.COLORS.length)];

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">CREATE INSTANCE</div>
      <div class="modal-body">
        Each instance gets its own desktop, files, and cursor color. Useful for
        sharing your machine with friends — and the scaffolding for real
        multiplayer when we hit Phase 4.
        <input type="text" id="ci-name" placeholder="Instance name (e.g. alex)" maxlength="20" />
        <div class="ci-colors" id="ci-colors"></div>
      </div>
      <div class="modal-actions">
        <button id="ci-cancel">Cancel</button>
        <button class="primary" id="ci-create">Create</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const colorsWrap = overlay.querySelector('#ci-colors');
  NodeProfiles.COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'ci-color' + (c === chosenColor ? ' sel' : '');
    sw.style.background = c;
    sw.onclick = () => {
      chosenColor = c;
      overlay.querySelectorAll('.ci-color').forEach(x => x.classList.remove('sel'));
      sw.classList.add('sel');
    };
    colorsWrap.appendChild(sw);
  });

  const nameInput = overlay.querySelector('#ci-name');
  setTimeout(() => nameInput.focus(), 30);

  return new Promise((resolve) => {
    const finish = (created) => {
      overlay.remove();
      resolve(created);
    };
    overlay.querySelector('#ci-cancel').onclick = () => finish(null);
    overlay.querySelector('#ci-create').onclick = () => {
      const name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }
      const p = NodeProfiles.create({ name, color: chosenColor });
      // After creating, switch to the new instance so user can set it up
      NodeProfiles.setActive(p.id);
      renderInstancesList();
      finish(p);
    };
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') overlay.querySelector('#ci-create').click();
      if (e.key === 'Escape') finish(null);
    });
    overlay.addEventListener('click', (e) => { if (e.target === overlay) finish(null); });
  });
}

function returnToHome() {
  if (!NodeProfiles.isSpectating()) return;
  NodeProfiles.setActive(NodeProfiles.homeId);
}

function updateSpecBanner() {
  const banner = document.getElementById('spec-banner');
  if (NodeProfiles.isSpectating()) {
    document.getElementById('sb-name').textContent = NodeProfiles.active().name;
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

/* ============================================================
   CUSTOM CURSOR LABEL
   ============================================================ */
function initCursorTracking() {
  const cursor = document.getElementById('me-cursor');
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    if (!cursor.classList.contains('show')) cursor.classList.add('show');
  });
  document.addEventListener('mouseleave', () => cursor.classList.remove('show'));
  updateCursorLabel();
}

function updateCursorLabel() {
  const cursor = document.getElementById('me-cursor');
  const p = NodeProfiles.active();
  if (!p) return;
  cursor.querySelector('.cur-dot').style.background = p.color;
  cursor.querySelector('.cur-name').textContent = p.name;
}

/* ============================================================
   CLOSE POPUPS WHEN CLICKING ELSEWHERE
   ============================================================ */
document.addEventListener('click', (e) => {
  if (!e.target.closest('#instances-popup') && !e.target.closest('#user-chip')) {
    document.getElementById('instances-popup').classList.remove('open');
    document.getElementById('user-chip').classList.remove('open');
  }
});

/* ============================================================
   WELCOME SCREEN — name, avatar colour, language
   ============================================================ */
function initWelcome() {
  const overlay = document.getElementById('welcome');
  const colorsEl = document.getElementById('wc-colors');
  const nameInput = document.getElementById('wc-name');
  const langSelect = document.getElementById('wc-lang');
  const form = document.getElementById('wc-form');

  // Soft museum palette for avatars
  const colors = ['#D4A862', '#6B8AAB', '#A55742', '#6F8A6F', '#A983A8', '#C2A579'];
  const home = NodeProfiles.home();
  let chosen = colors.includes(home?.color) ? home.color : colors[0];

  // Render colour swatches
  colorsEl.innerHTML = '';
  colors.forEach(c => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'wc-color' + (c === chosen ? ' sel' : '');
    btn.style.background = c;
    btn.onclick = () => {
      chosen = c;
      colorsEl.querySelectorAll('.wc-color').forEach(x => x.classList.remove('sel'));
      btn.classList.add('sel');
    };
    colorsEl.appendChild(btn);
  });

  // Restore language preference
  const savedLang = localStorage.getItem('node-lang') || 'en';
  langSelect.value = savedLang;
  langSelect.onchange = (e) => localStorage.setItem('node-lang', e.target.value);

  // Pre-fill name if profile already has one set (not the default)
  if (home && home.name && home.name !== 'NODE') nameInput.value = home.name;

  // Decide whether to show or skip
  const alreadyWelcomed = localStorage.getItem('node-welcomed') === '1';
  if (alreadyWelcomed) {
    overlay.classList.add('hidden');
  } else {
    setTimeout(() => nameInput.focus(), 300);
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = nameInput.value.trim() || 'NODE';
    // Update home profile's name + colour
    NodeProfiles.rename(NodeProfiles.homeId, name);
    const homeP = NodeProfiles.home();
    if (homeP) {
      homeP.color = chosen;
      NodeProfiles.persist();
    }
    // If active === home, reflect the colour change everywhere
    renderUserChip();
    updateCursorLabel();
    updateSpecBanner();
    // Push the new identity to peers if we're online
    if (window.NodePresence && NodePresence.publishIdentity) NodePresence.publishIdentity();
    // Mark welcomed
    localStorage.setItem('node-welcomed', '1');
    overlay.classList.add('hidden');
  });
}

function showWelcome() {
  // Pre-fill from current home profile so they can edit
  const home = NodeProfiles.home();
  const nameInput = document.getElementById('wc-name');
  if (home && nameInput) nameInput.value = home.name === 'NODE' ? '' : home.name;
  document.getElementById('welcome').classList.remove('hidden');
  setTimeout(() => nameInput?.focus(), 100);
}

/* ============================================================
   BOOT — initialize profiles, then filesystem, then UI
   ============================================================ */
NodeProfiles.init();
NodeFS.init();
NodeComms.init();
renderUserChip();
updateCursorLabel();
updateSpecBanner();
initCursorTracking();
// Restore the active profile's previously-open apps
(NodeProfiles.active()?.windowState || []).forEach(w => {
  try { openApp(w.app, w.opts || {}); } catch (e) { /* swallow */ }
});

// Apply icon overrides + wire right-click customization
NodeIcons.init();
setupIconContextMenu();

// Show welcome / first-run intro
initWelcome();

/* ============================================================
   KEYBOARD
   ============================================================ */
document.addEventListener('keydown', (e) => {
  if (e.key === 'F11') return; // let browser handle
  if (e.key === 'Escape') document.getElementById('start-menu').classList.remove('open');
});
